services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,z
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    environment:
      - TZ=UTC
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-logs:
